[custom]
; 启用规则生成器并覆盖原始规则
enable_rule_generator=true
overwrite_original_rules=true

; ==================== 策略组设置 ====================
; 🚀 节点选择：手动选择，包含自动选择、直连、以及所有匹配到的节点
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
; ♻️ 自动选择：使用 Cloudflare 节点进行高可用延迟测试
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,,50

; ==================== 分流规则（使用 jsDelivr 镜像加速，确保可用性） ====================
; 1. 本地网络与特殊放行（第一优先级，防止局域网设备、NAS、打印机无法访问）
ruleset=DIRECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/UnBan.list

; 2. 广告拦截（在直连和代理之前，确保国内大厂的广告域名不会被 DIRECT 截流）
ruleset=REJECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanAD.list
ruleset=REJECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanProgramAD.list

; 3. 强制代理与防 DNS 泄露自定义域名（修正语法，移除错误方括号）
ruleset=🚀 节点选择,DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🚀 节点选择,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/GoogleCNProxyIP.list

; 4. 中国大陆直连域名（优先匹配域名，命中则直接不走 DNS 解析，极速直连）
ruleset=DIRECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaDomain.list
ruleset=DIRECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaMedia.list

; 5. 中国大陆 IP 段直连（移除 no-resolve 以免未知国内域名滑落至 FINAL 导致内网穿透）
ruleset=DIRECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaIp.list
ruleset=DIRECT,GEOIP,CN

; 6. 兜底规则（未命中上述所有规则的海外域名/IP，统一走节点）
ruleset=🚀 节点选择,FINAL
