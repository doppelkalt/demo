# ====================================================================
# GitHub 托管专用 - OpenClash 生产级纯净配置模版
# 特点：高可用、完美防 DNS 泄露、无国家过滤、jsDelivr 镜像加速
# ====================================================================

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090

# ==================== 🔒 核心防 DNS 泄露拓扑 ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip      # Fake-IP 模式，本地 0 解析，彻底根除 DNS 泄露
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:1053
  
  # 用于解析下方 DoH 加密 DNS 域名的基础服务器
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  # 仅用于国内直连域名（ChinaDomain）和未知国内 IP 的安全解析
  nameserver:
    - https://dns.alicdn.com/dns-query
    - https://doh.pub/dns-query

# ==================== 📦 外部节点提供商（使用时请替换订阅） ====================
proxy-providers:
  my_airport:
    type: http
    # ⚠️ 部署提示：在不同设备上使用时，请将下方占位符替换为真实的机场订阅链接
    url: "YOUR_AIRPORT_SUBSCRIPTION_URL_HERE"
    interval: 3600
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

# ==================== ♻️ 策略组设置（完全卸载 Filter 过滤） ====================
proxy-groups:
  # 1. 主控制开关（手动选择）
  - name: 🚀 节点选择
    type: select
    use:
      - my_airport
    proxies:
      - ♻️ 自动选择
      - DIRECT

  # 2. 延迟测试自动切换（全量测速，不设国家限制）
  - name: ♻️ 自动选择
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - my_airport

# ==================== 🎯 精准分流规则（严格依照 ACL4SSR 权重） ====================
rules:
  # 1. 局域网与内网穿透（绝对第一优先级，保障本地 NAS、路由器后台、打印机畅通）
  - RULE-SET,LocalAreaNetwork,DIRECT
  - RULE-SET,UnBan,DIRECT

  # 2. 恶性广告拦截（在直连和代理之前，防止国内大厂广告上报命中直连）
  - RULE-SET,BanAD,REJECT

  # 3. 中国大陆白名单域名（大厂全覆盖，网页秒开，不走任何代理和无谓的本地 DNS 纠缠）
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaMedia,DIRECT

  # 4. 中国大陆本地 IP 底座（配合 Fake-IP 机制，未知的国内域名在此处解析 IP 并直连，绝不泄露）
  - RULE-SET,ChinaCompanyIp,DIRECT
  - RULE-SET,ChinaIp,DIRECT
  - GEOIP,CN,DIRECT

  # 5. 终极兜底（其余所有海外流量、黑名单流量，统一划归节点选择）
  - MATCH,🚀 节点选择

# ==================== 🌐 远程规则集订阅（jsDelivr 镜像加速管理） ====================
rule-providers:
  LocalAreaNetwork:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list
    path: ./providers/rule_LocalAreaNetwork.yaml
    interval: 86400

  UnBan:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/UnBan.list
    path: ./providers/rule_UnBan.yaml
    interval: 86400

  BanAD:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanAD.list
    path: ./providers/rule_BanAD.yaml
    interval: 86400

  ChinaDomain:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaDomain.list
    path: ./providers/rule_ChinaDomain.yaml
    interval: 86400

  ChinaMedia:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaMedia.list
    path: ./providers/rule_ChinaMedia.yaml
    interval: 86400

  ChinaCompanyIp:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaCompanyIp.list
    path: ./providers/rule_ChinaCompanyIp.yaml
    interval: 86400

  ChinaIp:
    type: http
    behavior: classical
    url: https://fastly.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaIp.list
    path: ./providers/rule_ChinaIp.yaml
    interval: 86400
